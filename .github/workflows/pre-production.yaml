name: 预生产模式

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: 构建
    runs-on: self-hosted
    steps:
      - name: 🚀 启动虚拟机
        run: |
          echo "测试能否联通宿主机？？？"
          ping -c 3 192.168.0.101

      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 📦 安装依赖
        run: pnpm dev
